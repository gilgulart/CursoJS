<!doctype html>
<html lang="pt-BR">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício Funções, Arrays e Objetos</title>
  </head>
  <body>
    <form class="form" action="" method="get">
      <label for="name">
        Nome:
        <input type="text" placeholder="digite o seu nome" class="name" />
      </label>

      <label for="lastname"
        >Sobrenome:
        <input
          type="text"
          placeholder="digite o seu sobrenome..."
          class="lastname"
        />
      </label>

      <label for="weight"
        >Peso:
        <input type="text" class="weight" />
      </label>

      <label for="height"
        >Altura
        <input type="text" class="height" />
      </label>

      <button type="submit">Enviar</button>
    </form>

    <div class="resultado"></div>

    <script src="js/index.js"></script>
  </body>
</html>
